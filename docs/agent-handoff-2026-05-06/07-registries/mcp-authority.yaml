known_blockers:
  - id: bare-npx-resolution
    severity: medium
    status: partially_resolved
    resolved_at: "2026-05-07"
    description: >
      Active configs using bare "npx" depend on shell PATH inheritance.
      Editors that spawn MCP servers without inheriting the user shell
      (Windsurf, Copilot) will fail to find npx. The canonical fix is
      absolute /home/irfankabir/.nvm/versions/node/v24.15.0/bin/npx.
    fixed_configs:
      - copilot # fixed 2026-05-07
      - codex-config # fixed 2026-05-07 (16 TS entries)
      - windsurf-current-home # was already correct on inspection
    not_applicable:
      - windsurf-next-current-home # file does not exist
    remaining_configs:
      - canonical-mcp-config # archive mount — fix if mount is live
      - canonical-claude-code-config # archive mount — fix if mount is live
    generic_mcp_home_note: >
      ~/.mcp.json (glimpse-server only) fixed 2026-05-07. Excluded from
      canonical count as it is a minimal stub, not a managed config.

  - id: glass-server-missing-from-claude-code-config
    severity: low
    status: resolved
    resolved_at: "2026-05-07"
    description: >
      claude_code_config.json was missing glass-server and (audit error)
      glimpse-server. Both added 2026-05-07. Config is now at 25/25 parity
      with the canonical server set. Authority audit had incorrectly listed
      glimpse-server as present — corrected in server_count_at_audit field.
    affected_configs:
      - canonical-claude-code-config

  - id: codex-extra-servers
    severity: info
    status: evaluated
    evaluated_at: "2026-05-07"
    decision: do_not_promote
    description: >
      Codex config has grid-rag-agentic and grid-memory servers not in the
      canonical 25. Both point to the preserved arch_data venv
      (/mnt/arch_data/home/caraxes/CascadeProjects/Projects/GRID-main/.venv)
      rather than the active roots/GRID venv. Evaluation complete.
    servers:
      - id: grid-rag-agentic
        script: mcp-setup/server/agentic_mcp_server.py
        assessment: >
          Agentic variant of the GRID RAG server. Runs with Ollama local
          inference (ministral-3) and .rag_db on the arch_data volume.
          Functional only if arch_data mount is live and the preserved venv
          is current. Active GRID dev is now in roots/GRID, making this
          server stale relative to current development.
        promotion_verdict: no
        promotion_blocker: "Points to archived arch_data venv, not roots/GRID"
      - id: grid-memory
        script: mcp-setup/server/memory_mcp_server.py
        assessment: >
          Thin wrapper over memory_mcp_server.py on the arch_data venv.
          Stale duplicate if roots/GRID has a parallel memory_mcp_server.py.
          Confirm with: ls ~/roots/GRID/mcp-setup/server/memory_mcp_server.py
        promotion_verdict: no
        promotion_blocker: "Points to archived arch_data venv, not roots/GRID"
    future_path: >
      If agentic-RAG or memory-MCP capabilities are needed in ~/.claude.json,
      rebuild entries pointing to the active roots/GRID venv once those server
      scripts are confirmed present there. Until then, keep in codex only as
      local-inference experiment servers.
    affected_configs:
      - codex-config

  - id: caraxes-stale-paths
    severity: info
    description: >
      /mnt/arch_data/home/caraxes/.cursor/mcp.json uses /home/caraxes paths
      that do not exist on the current system. Archive only.
    affected_configs:
