staleness_rules:
  dynamic_context:
    source: claude.dynamic_context
    stale_after_minutes: 70
    action: "Note '(stale, recommend refresh)' in session greeting"
  personal_rag_index:
    source: personal_rag.db
    stale_after_days: 7
    action: "Run reindex_personal_intel to rebuild HNSW index"
  codex_memories:
    source: codex.memories
    stale_after_days: 14
    action: "Review raw_memories.md for outdated entries; prune or archive"
  auto_memory:
    source: claude.auto_memory
    stale_after_days: 30
    action: "Review and archive notes older than 30 days"
  project_memory:
    source: claude.project_memory
    stale_after_days: 30
    action: "Verify memory-derived paths and facts against live code before acting"
  audit_trail:
    source: echoes.audit
    stale_after_days: 90
    action: "Rotate audit.ndjson; backup older entries"
  preserved_sources:
    source: "archive.*"
    stale_after_days: 0
    action: "Never treat as authoritative. Reference-only. Flag if any active path resolves here."

session_protocol:
  start:
    - "Call mcp__personal-rag__get_session_digest() and cite sha256 prefix"
    - "Read ~/.claude/SESSION_CONTEXT.md for narrow goal"
    - "Check dynamic-context.md staleness (>70 min = stale)"
    - "Verify memory-derived paths exist before trusting them"
    - "Run Lumos fast-lane (check_the_line, ecosystem_scan, enforcement_status)"
  during:
    - "Verify any path, function name, or config from memory against live disk state"
    - "If memory conflicts with observed code, trust code and update memory"
    - "Mark stale facts explicitly when discovered"
    - "Do not hallucinate context when personal-rag returns empty results"
  end:
    - "Session-end hook appends AuditEvent to ~/.echoes/audit.ndjson"
    - "Write .claude-progress.md if approaching limits (done/next/blockers)"
    - "Record changed files, validation status, and blockers"

known_gaps:
  - id: no_unified_retrieval
    severity: medium
    description: >
      Four separate memory systems (claude auto-memory, codex memories,
      claude knowledge, personal-rag) with no single retrieval contract.
      personal-rag indexes some but not all sources.
  - id: codex_memory_not_indexed
    severity: low
    description: >
      ~/.codex/memories/ is git-tracked with 78KB raw_memories.md but is not
      indexed by personal-rag. Rollout summaries contain useful session history.
  - id: knowledge_scripts_no_runner
    severity: low
    description: >
      ~/.claude/knowledge/ contains Python ingest/query scripts but no evidence
      of automated execution. May be a dead prototype.
  - id: arch_data_knowledge_drift
    severity: low
    description: >
      /mnt/arch_data/home/caraxes/.claude/knowledge/ is a mirror of the active
      knowledge dir. No mechanism to detect drift between them.
  - id: project_memory_scope_unknown
    severity: low
    description: >
      Only one project memory dir found (-home-irfankabir). Other project dirs
      under ~/.claude/projects/ may have memory subdirs not yet inventoried
      (permission issues during scan).
